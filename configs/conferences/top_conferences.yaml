    name_zh: 计算机网络
    description: Networking, Internet systems, wireless, measurement, and systems networking.
  architecture:
    name_zh: 计算机体系结构
    description: Computer architecture, microarchitecture, storage, and computer systems.
  ai:
    name_zh: 人工智能
    description: Machine learning, artificial intelligence, vision, NLP, and data mining.

