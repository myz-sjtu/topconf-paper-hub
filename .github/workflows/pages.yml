name: Build GitHub Pages

on:
  workflow_dispatch:
    inputs:
      refresh:
        description: 'Run crawler in GitHub Actions before building Pages'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    branches:
      - main
    paths:
      - app/**
      - configs/**
      - docs/**
      - scripts/**
      - package.json
      - pyproject.toml
      - .github/workflows/pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' && inputs.refresh == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        if: github.event_name == 'workflow_dispatch' && inputs.refresh == 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Collect papers and export static data
        if: github.event_name == 'workflow_dispatch' && inputs.refresh == 'true'
        env:
          TOPCONF_REFRESH: '1'
          TOPCONF_FORCE_REFRESH: '1'
        run: ./scripts/build_static_site.sh

      - name: Install Node dependencies
        run: npm install --no-audit --no-fund

      - name: Build VitePress
        env:
          VITEPRESS_BASE: /${{ github.event.repository.name }}/
        run: npm run docs:build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
